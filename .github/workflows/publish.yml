name: Publish to npm

# Fires on tag push matching v*, e.g. v0.1.0 or v1.2.3.
# Release flow:
#   1. Bump "version" in package.json on main.
#   2. git tag v0.1.0 && git push --tags
#
# Required:
#   - secrets.NPM_TOKEN — an npm "automation" access token with publish rights
#     on the @maildesk scope.
#   - id-token: write permission — enables npm provenance attestations.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
